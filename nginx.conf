server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable autoindex for templates directory (JSON format for JS fetch)
    location /templates/ {
        autoindex on;
        autoindex_format json;
    }

    # Cache static assets
    location ~* \.(avif|webp|png|jpg|gif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
